jellyfin:
  image:
    tag: 10.11.8
    repository: lscr.io/linuxserver/jellyfin
  service:
    externalTrafficPolicy: null
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hajimari.io/enable: "true"
      hajimari.io/appName: Jellyfin
      hajimari.io/group: Media
      hajimari.io/icon: mdi:multimedia
      hajimari.io/info: Media Server
    hosts: ["jellyfin.entropymaker.com"]
    tls:
      - hosts:
          - "jellyfin.entropymaker.com"
        secretName: entropymaker-com-tls
  persistence:
    config:
      storageClass: longhorn
      size: 4Gi
      accessMode: ReadWriteMany
    media:
      existingClaim: servarr-jellyfin-media
