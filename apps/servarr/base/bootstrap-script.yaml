apiVersion: v1
kind: ConfigMap
metadata:
  name: servarr-bootstrap-script
  namespace: servarr
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu

    log() {
      printf '%s\n' "$*"
    }

    wait_for_file() {
      file="$1"
      timeout="${2:-120}"
      elapsed=0

      while [ "$elapsed" -lt "$timeout" ]; do
        if [ -s "$file" ]; then
          return 0
        fi

        sleep 2
        elapsed=$((elapsed + 2))
      done

      log "Timed out waiting for file: $file"
      return 1
    }

    wait_for_http() {
      url="$1"
      timeout="${2:-180}"
      elapsed=0

      while [ "$elapsed" -lt "$timeout" ]; do
        if curl -fsS "$url" >/dev/null 2>&1; then
          return 0
        fi

        sleep 5
        elapsed=$((elapsed + 5))
      done

      log "Timed out waiting for endpoint: $url"
      return 1
    }

    xml_value() {
      file="$1"
      key="$2"
      sed -n "s:.*<$key>\(.*\)</$key>.*:\1:p" "$file" | head -n 1
    }

    sonarr_api() {
      method="$1"
      path="$2"
      data="${3:-}"

      if [ -n "$data" ]; then
        curl -fsS -X "$method" \
          -H "X-Api-Key: $SONARR_API_KEY" \
          -H "Content-Type: application/json" \
          --data "$data" \
          "${SONARR_URL}${path}"
      else
        curl -fsS -X "$method" \
          -H "X-Api-Key: $SONARR_API_KEY" \
          "${SONARR_URL}${path}"
      fi
    }

    prowlarr_api() {
      method="$1"
      path="$2"
      data="${3:-}"

      if [ -n "$data" ]; then
        curl -fsS -X "$method" \
          -H "X-Api-Key: $PROWLARR_API_KEY" \
          -H "Content-Type: application/json" \
          --data "$data" \
          "${PROWLARR_URL}${path}"
      else
        curl -fsS -X "$method" \
          -H "X-Api-Key: $PROWLARR_API_KEY" \
          "${PROWLARR_URL}${path}"
      fi
    }

    wait_for_file /config/sonarr/config.xml
    wait_for_file /config/prowlarr/config.xml
    wait_for_http "${SONARR_URL}/ping"
    wait_for_http "${PROWLARR_URL}/ping"
    wait_for_http "${QBITTORRENT_URL}/"

    SONARR_API_KEY="$(xml_value /config/sonarr/config.xml ApiKey)"
    PROWLARR_API_KEY="$(xml_value /config/prowlarr/config.xml ApiKey)"

    if [ -z "$SONARR_API_KEY" ] || [ -z "$PROWLARR_API_KEY" ]; then
      log "Missing Sonarr or Prowlarr API key in config.xml"
      exit 1
    fi

    if [ -z "${QBITTORRENT_USERNAME:-}" ] || [ -z "${QBITTORRENT_PASSWORD:-}" ]; then
      log "Missing qBittorrent credentials, skipping bootstrap"
      exit 0
    fi

    root_folder_payload='{"path":"/media/tv"}'
    root_folder_exists="$({ sonarr_api GET /api/v3/rootfolder || true; } | jq -e '.[] | select(.path == "/media/tv")' >/dev/null 2>&1 && printf true || printf false)"
    if [ "$root_folder_exists" = "false" ]; then
      log "Creating Sonarr root folder /media/tv"
      sonarr_api POST /api/v3/rootfolder "$root_folder_payload" >/dev/null
    else
      log "Sonarr root folder already present"
    fi

    qb_cookie=/tmp/qbittorrent.cookie
    login_response="$(curl -fsS -c "$qb_cookie" \
      --data-urlencode "username=${QBITTORRENT_USERNAME}" \
      --data-urlencode "password=${QBITTORRENT_PASSWORD}" \
      "${QBITTORRENT_URL}/api/v2/auth/login")"

    if [ "$login_response" != "Ok." ]; then
      log "qBittorrent login failed"
      exit 1
    fi

    log "Configuring qBittorrent preferences"
    curl -fsS -b "$qb_cookie" \
      --data-urlencode 'json={"save_path":"/media/downloads/complete","temp_path_enabled":true,"temp_path":"/media/downloads/incomplete"}' \
      "${QBITTORRENT_URL}/api/v2/app/setPreferences" >/dev/null

    curl -fsS -b "$qb_cookie" \
      --data-urlencode 'category=tv-sonarr' \
      --data-urlencode 'savePath=/media/downloads/complete' \
      "${QBITTORRENT_URL}/api/v2/torrents/createCategory" >/dev/null || true

    SONARR_DOWNLOADCLIENT_SCHEMA="$(sonarr_api GET /api/v3/downloadclient/schema)"
    SONARR_DOWNLOADCLIENTS="$(sonarr_api GET /api/v3/downloadclient)"
    EXISTING_SONARR_QBT="$(printf '%s' "$SONARR_DOWNLOADCLIENTS" | jq -c 'map(select(.implementation == "QBittorrent" or .implementationName == "QBittorrent")) | .[0] // empty')"

    sonarr_qbt_filter='.
      | .enable = true
      | .name = "qBittorrent"
      | .priority = 1
      | .removeCompletedDownloads = false
      | .removeFailedDownloads = false
      | .tags = (.tags // [])
      | .fields |= map(
          if .name == "host" then .value = "servarr-qbittorrent-web"
          elif .name == "port" then .value = 8080
          elif .name == "useSsl" then .value = false
          elif .name == "urlBase" then .value = ""
          elif .name == "username" then .value = env.QBITTORRENT_USERNAME
          elif .name == "password" then .value = env.QBITTORRENT_PASSWORD
          elif .name == "tvCategory" then .value = "tv-sonarr"
          elif .name == "tvDirectory" then .value = "/media/downloads/complete"
          elif .name == "initialState" then .value = 0
          elif .name == "sequentialOrder" then .value = false
          elif .name == "firstAndLast" then .value = false
          else . end
        )'

    if [ -n "$EXISTING_SONARR_QBT" ]; then
      log "Updating Sonarr qBittorrent download client"
      SONARR_QBT_PAYLOAD="$(printf '%s' "$EXISTING_SONARR_QBT" | jq -c "$sonarr_qbt_filter")"
      SONARR_QBT_ID="$(printf '%s' "$EXISTING_SONARR_QBT" | jq -r '.id')"
      sonarr_api PUT "/api/v3/downloadclient/${SONARR_QBT_ID}" "$SONARR_QBT_PAYLOAD" >/dev/null
    else
      log "Creating Sonarr qBittorrent download client"
      SONARR_QBT_PAYLOAD="$(printf '%s' "$SONARR_DOWNLOADCLIENT_SCHEMA" | jq -c 'map(select(.implementation == "QBittorrent" or .implementationName == "QBittorrent")) | .[0]' | jq -c "$sonarr_qbt_filter")"
      sonarr_api POST /api/v3/downloadclient "$SONARR_QBT_PAYLOAD" >/dev/null
    fi

    PROWLARR_APPLICATION_SCHEMA="$(prowlarr_api GET /api/v1/applications/schema)"
    PROWLARR_APPLICATIONS="$(prowlarr_api GET /api/v1/applications)"
    EXISTING_PROWLARR_SONARR="$(printf '%s' "$PROWLARR_APPLICATIONS" | jq -c 'map(select(.implementation == "Sonarr" or .implementationName == "Sonarr")) | .[0] // empty')"

    prowlarr_sonarr_filter='.
      | .enable = true
      | .name = "Sonarr"
      | .syncLevel = (.syncLevel // "fullSync")
      | .fields |= map(
          if .name == "host" then .value = "servarr-sonarr"
          elif .name == "port" then .value = 80
          elif .name == "apiKey" then .value = env.SONARR_API_KEY
          elif .name == "baseUrl" then .value = ""
          elif .name == "useSsl" then .value = false
          else . end
        )'

    if [ -n "$EXISTING_PROWLARR_SONARR" ]; then
      log "Updating Prowlarr Sonarr application"
      PROWLARR_SONARR_PAYLOAD="$(printf '%s' "$EXISTING_PROWLARR_SONARR" | jq -c "$prowlarr_sonarr_filter")"
      PROWLARR_SONARR_ID="$(printf '%s' "$EXISTING_PROWLARR_SONARR" | jq -r '.id')"
      prowlarr_api PUT "/api/v1/applications/${PROWLARR_SONARR_ID}" "$PROWLARR_SONARR_PAYLOAD" >/dev/null
    else
      log "Creating Prowlarr Sonarr application"
      PROWLARR_SONARR_PAYLOAD="$(printf '%s' "$PROWLARR_APPLICATION_SCHEMA" | jq -c 'map(select(.implementation == "Sonarr" or .implementationName == "Sonarr")) | .[0]' | jq -c "$prowlarr_sonarr_filter")"
      prowlarr_api POST /api/v1/applications "$PROWLARR_SONARR_PAYLOAD" >/dev/null
    fi

    log "Servarr bootstrap complete"
